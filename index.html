<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">

  <title>Frontend Mentor | Product preview card component</title>
<body>

  <main class="preview-card">
    <div class="image">
      <picture>
        <source media= "(min-width: 40rem)" class="mobile" srcset="images/image-product-desktop.jpg" alt="">
        <img class="desktop" src="./images/image-product-mobile.jpg" alt="">
      </picture>
    </div>

    <div class="content">
      <div>
        <p class="product">Perfume</p>
        <h1>Gabrielle Essence Eau De Parfum</h1>
        <p class="text">
          A floral, solar and voluptuous interpretation composed by Olivier Polge,
          Perfumer-Creator for the House of CHANEL.
        </p>
        <div class="prices">
          <p class="offerPrice">$149.99</p>
          <p class="price"><del>$169.99</del></p>
        </div>
        <button>
          <img src="images/icon-cart.svg" alt="">
          <span>Add to Cart</span>
        </button>
      </div>
    </div>
  </main>
  
  <footer class="attribution">
    <p>
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"> Frontend Mentor</a>.
      Coded by <a href="https://www.frontendmentor.io/profile/raphaelsiqueiira"> Raphael Siqueira</a>.
    </p>
  </footer>
</body>
</html>
